when:
  event: push

labels:
  platform: linux/amd64 # it doesn't build on arm64, unfortuantely

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0
      lfs: false

steps:
  prepare_env:
    image: debian:latest
    commands:
      - apt update && apt install -y git
      - chmod +x ./.woodpecker/semver-from-git.sh
      - ./.woodpecker/semver-from-git.sh > .env
      - cat .env

  build:
    image: source.hodakov.me/containers/renkit:latest
    environment:
      SDL_AUDIODRIVER: dummy
      SDL_VIDEODRIVER: dummy
      RENPY_VERSION: 8.3.7
      KEYSTORE_APK:
        from_secret: keystore_apk
      KEYSTORE_PASS:
        from_secret: keystore_pass
    commands:
      - env
      - exit 1
      - mkdir ./dists /data/${CI_COMMIT_SHA:0:10}/
      - sed -i "s#KEYSTORE_APK#$${KEYSTORE_APK}#" renconstruct.toml
      - sed -i "s#KEYSTORE_ALIAS#$${KEYSTORE_ALIAS}#" renconstruct.toml
      - sed -i "s#KEYSTORE_PASS#$${KEYSTORE_PASS}#" renconstruct.toml
      - sed -i "s#RENPY_VERSION#$${RENPY_VERSION}#" renconstruct.toml
      - renconstruct build -c renconstruct.toml . ./dists
      - cp -Rv ./dists/* /data/${CI_COMMIT_SHA:0:10}/
    when:
      event: push
    volumes:
      - "/data/ci/:/data"
    depends_on:
      - prepare_env
