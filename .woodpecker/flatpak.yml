when:
  event: tag

depends_on:
  - build

labels:
  platform: linux/amd64 # it doesn't work on arm64 unfortunately

variables:
  .ssh_setup_start_agent: &ssh_setup_start_agent eval $(ssh-agent -s)
  .ssh_setup_import_key: &ssh_setup_import_key echo "$${CI_PRIVATE_SSH_KEY}" | ssh-add -
  .ssh_setup_configure: &ssh_setup_configure mkdir -p ~/.ssh && echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  .install_ssh: &install_ssh apk update && apk add openssh-client

steps:
  prepare-env:
    image: alpine:latest
    commands:
      - apk update && apk add git
      - chmod +x ./scripts/*.sh
      - ./scripts/prepare_env.sh

  build:
    image: source.hodakov.me/containers/renkit:6.1.0
    environment:
      SDL_AUDIODRIVER: dummy
      SDL_VIDEODRIVER: dummy
      RENPY_VERSION: 8.5.2
      KEYSTORE_APK:
        from_secret: keystore_apk
      KEYSTORE_PASS:
        from_secret: keystore_pass
    commands:
      - export $(grep -v '^#' .env | xargs)
      - mkdir ./dists/
      - sed -i "s#0.0.0-localbuild#$${CI_KSRE_VERSION}#" game/config.rpy
      # Disable Steam Achievements for Flatpak release since they're no-op outside of Steam.
      - sed -i 's/define config.steam_appid = "3068300"/define config.steam_appid = None/g' game/achievement.rpy
      - sed -i "s#RENPY_VERSION#$${RENPY_VERSION}#" renconstruct/flatpak.toml
      - renconstruct build -c renconstruct/flatpak.toml . ./dists
    depends_on:
      - prepare-env

  package-flatpak:
    image: alpine:latest
    commands:
      - cd ./dists/
      - tar xf ./KSRE-linux.tar.bz2
      - mkdir -p ./bundle/amd64/app/ksre ./bundle/aarch64/app/ksre
      - mkdir -p ./bundle/amd64/bin ./bundle/aarch64/bin
      - cp -R ./KSRE-linux/* ./bundle/amd64/app/ksre
      - cp -R ./KSRE-linux/* ./bundle/aarch64/app/ksre
      # It's simpler to remove unneccessary stuff than to filter neccessary, lol.
      - rm -rf ./bundle/amd64/app/ksre/lib/py3-linux-aarch64
      - rm -rf ./bundle/aarch64/app/ksre/lib/py3-linux-amd64
      - cp ../scripts/flatpak-launcher.sh ./bundle/amd64/bin/ksre
      - cp ../scripts/flatpak-launcher.sh ./bundle/aarch64/bin/ksre
      - chmod +x ./bundle/amd64/bin/ksre
      - chmod +x ./bundle/aarch64/bin/ksre
      - tar cjvf ./sh.fhs.ksre.flatpak-root-amd64.tar.bz2 -C ./bundle/amd64 .
      - tar cjvf ./sh.fhs.ksre.flatpak-root-aarch64.tar.bz2 -C ./bundle/aarch64 .
    depends_on:
      - prepare-env
      - build


  upload-flatpak-assets:
    image: alpine:latest
    environment:
      CI_SSH_HOST:
        from_secret: storage_ssh_host
      CI_SSH_PORT:
        from_secret: storage_ssh_port
      CI_SSH_USER:
        from_secret: storage_ssh_user
      CI_PRIVATE_SSH_KEY:
        from_secret: storage_ssh_key
      CI_STORAGE_PREFIX:
        from_secret: storage_directory_prefix
    commands:
      - export $(grep -v '^#' .env | xargs)
      - *install_ssh
      - *ssh_setup_start_agent
      - *ssh_setup_import_key
      - *ssh_setup_configure
      - scp -P $${CI_SSH_PORT} ./dists/sh.fhs.ksre.flatpak-root-* "$${CI_SSH_USER}@$${CI_SSH_HOST}:$${CI_STORAGE_PREFIX}/$${CI_PRETTY_VERSION}"
    depends_on:
      - prepare-env
      - build
      - package-flatpak
